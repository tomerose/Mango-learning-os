name: Build Android APK

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Create Capacitor project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          echo '<!DOCTYPE html><html><meta charset="utf-8"><title>Mango</title><meta http-equiv="refresh" content="0;url=https://mangoleaningos.top"></html>' > www/index.html

      - name: Configure and Init
        run: |
          cat > capacitor.config.json << 'ENDCONFIG'
          {"appId":"com.mango.learningos","appName":"Mango","webDir":"www","server":{"url":"https://mangoleaningos.top","cleartext":false}}
          ENDCONFIG
          npx cap init "Mango" "com.mango.learningos" --web-dir=www
          npx cap add android
          npx cap sync

      - name: Set Gradle memory
        run: echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mango-APK
          path: android/app/build/outputs/apk/release/*.apk
