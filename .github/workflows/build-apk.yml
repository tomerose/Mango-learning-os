name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with: { target: '34' }

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor project
        run: |
          mkdir -p www && echo '<html></html>' > www/index.html
          npx cap init "Mango Learning OS" "com.mango.learningos" --web-dir=www

      - name: Configure PWA mode
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.mango.learningos",
            "appName": "Mango Learning OS",
            "webDir": "www",
            "server": {
              "url": "https://mangoleaningos.top",
              "cleartext": false
            },
            "android": {
              "allowMixedContent": false
            }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync
        run: npx cap sync

      - name: Build APK
        run: cd android && ./gradlew assembleRelease

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mango-Learning-OS-APK
          path: android/app/build/outputs/apk/**/*.apk
